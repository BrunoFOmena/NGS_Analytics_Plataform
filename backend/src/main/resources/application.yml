server:
  port: 8080

spring:
  application:
    name: ngs-analytics-api
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 200MB
  profiles:
    default: dev-h2

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}

ngs:
  jwt:
    secret: "change-me-ngs-analytics-platform-jwt-secret-key-32bytes-min"
    expiration-ms: 86400000
  storage:
    local-dir: ../data/uploads
    max-upload-bytes: 209715200

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.ngs: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

---
# Unit/integration tests (Surefire). In-memory H2.
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:h2:mem:ngs;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop

ngs:
  storage:
    local-dir: ${java.io.tmpdir}/ngs-test-uploads

---
# Production / staging: Postgres (override URL via env when deploying).
# Activate with: -Dspring-boot.run.profiles=prod
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ngs}
    username: ${SPRING_DATASOURCE_USERNAME:ngs}
    password: ${SPRING_DATASOURCE_PASSWORD:ngs}
    driver-class-name: org.postgresql.Driver
