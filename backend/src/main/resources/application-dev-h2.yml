# Default for local/Cloud Agents (no Postgres required).
#   mvn spring-boot:run
#   mvn spring-boot:run "-Dspring-boot.run.profiles=dev-h2"
spring:
  datasource:
    url: jdbc:h2:file:../data/ngs-h2;MODE=PostgreSQL;AUTO_SERVER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
  h2:
    console:
      enabled: true

ngs:
  storage:
    local-dir: ../data/uploads
