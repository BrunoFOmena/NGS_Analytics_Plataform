# Optional local Postgres (staging-like). Not required for tests or Cloud Agents.
#   docker compose up -d
#   mvn spring-boot:run "-Dspring-boot.run.profiles=prod"

services:
  postgres:
    image: postgres:16-alpine
    container_name: ngs-postgres
    environment:
      POSTGRES_DB: ngs
      POSTGRES_USER: ngs
      POSTGRES_PASSWORD: ngs
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ngs -d ngs"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
